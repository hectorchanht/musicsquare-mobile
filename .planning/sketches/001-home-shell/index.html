<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MusicSquare — Home Shell sketch (001)</title>
<link rel="stylesheet" href="../themes/default.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: #2b2b33;
    color: var(--color-text);
    padding-top: 52px;
    min-height: 100vh;
  }

  /* ---- variant tab bar ---- */
  #variant-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 9998;
    background: #101015; border-bottom: 1px solid #2a2a33;
    padding: 8px 12px; display: flex; gap: 8px; align-items: center;
    font-size: 13px;
  }
  #variant-nav b { color: #fff; margin-right: 8px; font-size: 13px; }
  .variant-tab {
    background: #20202a; color: #c8c8d2; border: 1px solid #2f2f3a;
    padding: 6px 12px; border-radius: 999px; cursor: pointer; font-size: 12px;
    transition: all .15s ease;
  }
  .variant-tab:hover { background: #2a2a36; color: #fff; }
  .variant-tab.active { background: var(--color-primary); color: #fff; border-color: transparent; }

  /* ---- stage / phone frame ---- */
  .stage { display: flex; justify-content: center; padding: 28px 12px 60px; }
  .variant { display: none; }
  .variant.active { display: block; }
  .phone {
    width: var(--phone-w); height: var(--phone-h);
    background: var(--color-bg);
    border-radius: 42px; border: 10px solid #000;
    box-shadow: var(--shadow-lg); overflow: hidden; position: relative;
    display: flex; flex-direction: column;
  }
  .notch { position:absolute; top:10px; left:50%; transform:translateX(-50%); width:96px; height:22px; background:#000; border-radius:999px; z-index:30; }
  .statusbar { display:flex; justify-content:space-between; align-items:center; padding:14px 22px 4px; font-size:12px; color:var(--color-text-muted); }
  .statusbar .right { display:flex; gap:6px; }

  /* scrollable content area between fixed top nav and fixed bottom bars */
  .screen { flex:1; display:flex; flex-direction:column; min-height:0; }
  .content { flex:1; overflow-y:auto; padding:0 16px 12px; }
  .content::-webkit-scrollbar { width:0; }

  /* ---- top nav ---- */
  .topnav { display:flex; align-items:center; justify-content:space-between; padding:6px 16px 10px; }
  .brand { display:flex; align-items:center; gap:8px; font-weight:800; font-size:var(--text-xl); }
  .brand .dot { width:22px; height:22px; border-radius:50%; background:var(--color-primary); display:grid; place-items:center; font-size:13px; }
  .navicons { display:flex; align-items:center; gap:14px; }
  .iconbtn { background:none; border:none; color:var(--color-text); font-size:19px; cursor:pointer; display:grid; place-items:center; width:34px; height:34px; border-radius:50%; transition:background .15s ease; }
  .iconbtn:hover { background:var(--color-surface-2); }
  .avatar { width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,#ff8a00,#ff2d55); }

  /* search pill (variant C) */
  .searchpill { flex:1; margin:0 10px; background:var(--color-surface-2); border:1px solid var(--color-border); border-radius:999px; padding:8px 14px; color:var(--color-text-muted); font-size:13px; display:flex; align-items:center; gap:8px; cursor:pointer; }

  /* ---- mood chips (variant A) ---- */
  .chips { display:flex; gap:8px; overflow-x:auto; padding:4px 16px 12px; }
  .chips::-webkit-scrollbar { height:0; }
  .chip { white-space:nowrap; background:var(--color-surface-2); border:1px solid var(--color-border); color:var(--color-text); padding:7px 16px; border-radius:999px; font-size:13px; cursor:pointer; transition:all .15s ease; }
  .chip:hover { background:#2a2a36; }
  .chip.active { background:#fff; color:#000; border-color:#fff; }

  .sectionhead { display:flex; align-items:baseline; justify-content:space-between; margin:6px 0 12px; }
  .sectionhead h2 { font-size:var(--text-lg); }
  .sectionhead .more { font-size:12px; color:var(--color-text-muted); border:1px solid var(--color-border); padding:4px 12px; border-radius:999px; cursor:pointer; }

  /* ---- 3x3 grid ---- */
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .tile { position:relative; border-radius:var(--radius-md); overflow:hidden; cursor:pointer; aspect-ratio:1/1; transition:transform .12s ease; }
  .tile:active { transform:scale(.96); }
  .tile .art { position:absolute; inset:0; }
  .tile .scrim { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.78) 0%, rgba(0,0,0,0) 55%); }
  .tile .label { position:absolute; left:7px; right:7px; bottom:6px; }
  .tile .t-title { font-size:11px; font-weight:700; line-height:1.2; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .tile .t-artist { font-size:10px; color:#d8d8de; margin-top:2px; opacity:.85; }
  .src-badge { position:absolute; top:6px; left:6px; font-size:9px; font-weight:800; letter-spacing:.3px; padding:2px 6px; border-radius:999px; color:#fff; text-transform:uppercase; }
  .q-badge { position:absolute; top:6px; right:6px; font-size:8.5px; font-weight:700; padding:2px 5px; border-radius:4px; background:rgba(0,0,0,.55); color:#fff; }
  .tile .playicon { position:absolute; inset:0; display:grid; place-items:center; opacity:0; transition:opacity .15s ease; }
  .tile:hover .playicon { opacity:1; }
  .tile .playicon span { width:38px; height:38px; border-radius:50%; background:rgba(0,0,0,.55); display:grid; place-items:center; font-size:16px; }

  /* Variant B: titles below tile */
  [data-variant="b"] .tile .scrim,
  [data-variant="b"] .tile .label { display:none; }
  [data-variant="b"] .gcell .b-meta { margin-top:6px; }
  [data-variant="b"] .gcell .b-title { font-size:12px; font-weight:700; line-height:1.2; display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden; }
  [data-variant="b"] .gcell .b-artist { font-size:11px; color:var(--color-text-muted); margin-top:2px; }
  .gcell { display:flex; flex-direction:column; }
  [data-variant="a"] .b-meta, [data-variant="c"] .b-meta { display:none; }

  .greeting { font-size:var(--text-2xl); font-weight:800; margin:4px 0 16px; }

  /* ---- now playing bar ---- */
  .nowbar { display:flex; align-items:center; gap:10px; padding:8px 12px; margin:0 8px 6px; border-radius:14px; background:var(--color-surface-2); }
  .nowbar .np-art { width:42px; height:42px; border-radius:8px; flex:none; }
  .nowbar .np-meta { flex:1; min-width:0; }
  .nowbar .np-title { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .nowbar .np-artist { font-size:11px; color:var(--color-text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .nowbar .np-ctrls { display:flex; align-items:center; gap:6px; }
  .np-prog { position:relative; height:2px; background:rgba(255,255,255,.15); margin:0 16px 0; border-radius:2px; }
  .np-prog > i { position:absolute; left:0; top:0; height:100%; width:38%; background:var(--color-primary); border-radius:2px; }

  /* ---- bottom tab nav ---- */
  .tabbar { display:flex; justify-content:space-around; padding:8px 6px calc(8px + env(safe-area-inset-bottom)); border-top:1px solid var(--color-border); background:var(--color-bg); }
  .tab { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10px; color:var(--color-text-muted); cursor:pointer; flex:1; padding:2px 0; background:none; border:none; transition:color .15s ease; }
  .tab .ic { font-size:18px; }
  .tab.active { color:var(--color-text); }

  /* search overlay */
  .search-ov { position:absolute; inset:0; background:var(--color-bg); z-index:40; display:none; flex-direction:column; padding:16px; }
  .search-ov.open { display:flex; }
  .search-ov input { background:var(--color-surface-2); border:1px solid var(--color-border); color:var(--color-text); border-radius:12px; padding:12px 14px; font-size:15px; outline:none; }
  .search-ov .close { align-self:flex-end; background:none;border:none;color:var(--color-text-muted);font-size:14px;cursor:pointer;margin-bottom:10px; }
  .search-ov .hint { color:var(--color-text-muted); font-size:13px; margin-top:14px; }

  /* per-variant accent overrides */
  [data-variant="a"] { --color-primary:#ff0033; }
  [data-variant="b"] { --color-primary:#1db954; }
  [data-variant="c"] { --color-primary:#7c5cff; }
  [data-variant="c"] .phone { background:radial-gradient(120% 60% at 50% 0%, #1a1326 0%, var(--color-bg) 55%); }
  [data-variant="c"] .nowbar { background:rgba(40,32,60,.55); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.08); }
</style>
</head>
<body>

<div id="variant-nav">
  <b>001 · Home Shell</b>
  <button class="variant-tab active" onclick="showVariant('a',event)">A: YT-Music faithful</button>
  <button class="variant-tab" onclick="showVariant('b',event)">B: Spotify-esque</button>
  <button class="variant-tab" onclick="showVariant('c',event)">C: MusicSquare-branded</button>
</div>

<div class="stage">
  <div class="variant active" id="variant-a" data-variant="a"></div>
  <div class="variant" id="variant-b" data-variant="b"></div>
  <div class="variant" id="variant-c" data-variant="c"></div>
</div>

<!-- sketch toolbar -->
<div id="sketch-tools" style="position:fixed;bottom:12px;right:12px;z-index:9999;font-family:system-ui;font-size:12px;background:rgba(0,0,0,0.75);color:#fff;padding:8px 12px;border-radius:8px;opacity:0.4;transition:opacity .2s;display:flex;gap:10px;align-items:center;" onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='0.4'">
  <span>tap a tile ▸ plays in the bottom bar · tap 🔍 ▸ search</span>
</div>

<script>
// 9 "top random songs" — grounded in the Phase 1 Track shape:
// { title, artist, album, source: netease|qq|kuwo|joox, qualityLabel }
const SONGS = [
  { title:'夜曲',                 artist:'周杰伦',        source:'netease', q:'FLAC', hue:[268,72,28] },
  { title:'稻香',                 artist:'周杰伦',        source:'qq',      q:'320k', hue:[140,55,30] },
  { title:'告白气球',             artist:'周杰伦',        source:'kuwo',    q:'FLAC', hue:[42,90,45]  },
  { title:'YOUR LOVE (feat. House Gospel)', artist:'Shouse', source:'joox', q:'AAC', hue:[50,95,52] },
  { title:'晴天',                 artist:'周杰伦',        source:'netease', q:'320k', hue:[205,60,40] },
  { title:'Victory Lap',          artist:'Nipsey Hussle',  source:'qq',      q:'FLAC', hue:[18,70,38]  },
  { title:'VAGABUNDO',            artist:'Various',        source:'kuwo',    q:'320k', hue:[320,65,42] },
  { title:'clouds disintegrating',artist:'Lo-fi Collective',source:'joox',  q:'AAC',  hue:[195,55,40] },
  { title:'Lana Del Rey — Mix',   artist:'Lana Del Rey',   source:'netease', q:'FLAC', hue:[0,0,30]    },
];
const SRC_COLOR = { netease:'var(--src-netease)', qq:'var(--src-qq)', kuwo:'var(--src-kuwo)', joox:'var(--src-joox)' };
const SRC_LABEL = { netease:'NetEase', qq:'QQ', kuwo:'Kuwo', joox:'JOOX' };

function cover(hue){ const [h,s,l]=hue; return `background:linear-gradient(145deg,hsl(${h} ${s}% ${l}%),hsl(${(h+40)%360} ${s}% ${Math.max(12,l-14)}%));`; }

function tile(s, i, variant){
  const overlaid = variant!=='b';
  return `
  <div class="gcell">
    <div class="tile" data-i="${i}">
      <div class="art" style="${cover(s.hue)}"></div>
      <span class="src-badge" style="background:${SRC_COLOR[s.source]}">${SRC_LABEL[s.source]}</span>
      <span class="q-badge">${s.q}</span>
      ${overlaid?`<div class="scrim"></div><div class="label"><div class="t-title">${s.title}</div><div class="t-artist">${s.artist}</div></div>`:''}
      <div class="playicon"><span>▶</span></div>
    </div>
    <div class="b-meta"><div class="b-title">${s.title}</div><div class="b-artist">${s.artist}</div></div>
  </div>`;
}

function phone(variant){
  const grid = SONGS.map((s,i)=>tile(s,i,variant)).join('');
  const chips = variant==='a'
    ? `<div class="chips">${['Relax','Workout','Focus','Energize','Commute'].map((c,idx)=>`<button class="chip${idx===0?' active':''}">${c}</button>`).join('')}</div>` : '';
  const greeting = variant==='b' ? `<div class="greeting">Good evening</div>` : '';
  const sectionHead = variant!=='b'
    ? `<div class="sectionhead"><h2>Top picks for you</h2><div class="more">More</div></div>` : '';

  // top nav: B/C use a search pill, A uses an icon (closer to YT Music)
  const topnav = variant==='c'
    ? `<div class="topnav"><div class="brand"><span class="dot">♪</span>MusicSquare</div></div>
       <div class="topnav" style="padding-top:0"><div class="searchpill" data-action="search">🔍 Search songs, artists across all sources</div></div>`
    : `<div class="topnav">
         <div class="brand"><span class="dot">♪</span>MusicSquare</div>
         <div class="navicons">
           <button class="iconbtn" title="Cast">📡</button>
           <button class="iconbtn" data-action="search" title="Search">🔍</button>
           <div class="avatar"></div>
         </div>
       </div>`;

  return `
  <div class="phone">
    <div class="notch"></div>
    <div class="statusbar"><span>12:30</span><span class="right">📶 🔋</span></div>
    <div class="screen">
      ${topnav}
      ${chips}
      <div class="content">
        ${greeting}
        ${sectionHead}
        <div class="grid">${grid}</div>
        <div style="height:8px"></div>
      </div>
      <div class="nowbar">
        <div class="np-art" style="${cover(SONGS[3].hue)}"></div>
        <div class="np-meta">
          <div class="np-title">${SONGS[3].title}</div>
          <div class="np-artist">${SONGS[3].artist} · ${SRC_LABEL[SONGS[3].source]}</div>
        </div>
        <div class="np-ctrls">
          <button class="iconbtn" title="Cast">📡</button>
          <button class="iconbtn" data-action="playpause" title="Play/pause">⏸</button>
        </div>
      </div>
      ${variant==='b'?'<div class="np-prog"><i></i></div>':''}
      <div class="tabbar">
        <button class="tab active"><span class="ic">⌂</span>Home</button>
        <button class="tab" data-action="search"><span class="ic">🔍</span>Search</button>
        <button class="tab"><span class="ic">≡</span>Library</button>
      </div>
    </div>
    <!-- search overlay -->
    <div class="search-ov">
      <button class="close" data-action="closesearch">✕ close</button>
      <input placeholder="Search across NetEase · QQ · Kuwo · JOOX" autofocus />
      <div class="hint">Type a song or artist — results fan out across all 4 sources and interleave.</div>
    </div>
  </div>`;
}

['a','b','c'].forEach(v => { document.getElementById('variant-'+v).innerHTML = phone(v); });

// ---- interactivity (event delegation per phone) ----
document.querySelectorAll('.variant').forEach(root => {
  root.addEventListener('click', e => {
    const tileEl = e.target.closest('.tile');
    const actionEl = e.target.closest('[data-action]');
    if (tileEl){
      const i = +tileEl.dataset.i; const s = SONGS[i];
      const bar = root.querySelector('.nowbar');
      bar.querySelector('.np-art').setAttribute('style', cover(s.hue));
      bar.querySelector('.np-title').textContent = s.title;
      bar.querySelector('.np-artist').textContent = s.artist + ' · ' + SRC_LABEL[s.source];
      bar.querySelector('[data-action="playpause"]').textContent = '⏸';
      bar.animate([{transform:'scale(1)'},{transform:'scale(1.02)'},{transform:'scale(1)'}],{duration:200});
      return;
    }
    if (actionEl){
      const a = actionEl.dataset.action;
      if (a==='search'){ root.querySelector('.search-ov').classList.add('open'); }
      else if (a==='closesearch'){ root.querySelector('.search-ov').classList.remove('open'); }
      else if (a==='playpause'){ actionEl.textContent = actionEl.textContent.trim()==='⏸' ? '▶' : '⏸'; }
      // bottom tab active state
      const tab = e.target.closest('.tab');
      if (tab && tab.parentElement.classList.contains('tabbar')){
        root.querySelectorAll('.tabbar .tab').forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');
      }
    }
    // chips active
    const chip = e.target.closest('.chip');
    if (chip){ root.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); chip.classList.add('active'); }
    // bottom tab active (when not a data-action)
    const tab = e.target.closest('.tabbar .tab');
    if (tab){ root.querySelectorAll('.tabbar .tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); }
  });
});

function showVariant(id, ev){
  document.querySelectorAll('.variant').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.variant-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('variant-'+id).classList.add('active');
  ev.target.classList.add('active');
}
</script>
</body>
</html>
